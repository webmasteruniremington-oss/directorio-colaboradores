name: Construir directorio

on:
  push:
    paths:
      - 'data/**'
      - 'scripts/**'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      - name: Generar colaboradores.json
        run: node scripts/build.js

      - name: Publicar cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/colaboradores.json
          if git diff --staged --quiet; then
            echo "Sin cambios en el JSON."
          else
            git commit -m "chore: actualizar colaboradores.json [skip ci]"
            git push
          fi
