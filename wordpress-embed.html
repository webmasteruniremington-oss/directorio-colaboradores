<div id="ur-directorio" data-src="https://webmasteruniremington-oss.github.io/directorio-colaboradores/colaboradores.json">
  <div class="ur-head">
    <h2 class="ur-title">Directorio telefónico de colaboradores</h2>
    <p class="ur-sub">Áreas de servicio a la comunidad y usuarios externos</p>
  </div>
  <div class="ur-toolbar">
    <div class="ur-search-wrap">
      <svg class="ur-search-ic" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      <input type="search" class="ur-search" placeholder="Buscar por nombre, cargo o correo…" aria-label="Buscar">
    </div>
    <select class="ur-filter ur-sede" aria-label="Filtrar por sede"><option value="">Todas las sedes</option></select>
    <select class="ur-filter ur-dep" aria-label="Filtrar por dependencia"><option value="">Todas las dependencias</option></select>
  </div>
  <p class="ur-count" aria-live="polite"></p>
  <div class="ur-grid" role="list"></div>
  <div class="ur-empty" hidden><strong>Sin resultados</strong><span>No hay colaboradores que coincidan con tu búsqueda.</span></div>
  <p class="ur-loading">Cargando directorio…</p>
</div>

<style>
#ur-directorio{--ur-rojo:#d6202b;--ur-rojo-osc:#a3151d;--ur-tinta:#111826;--ur-gris:#5b6472;--ur-gris2:#8a93a2;--ur-linea:#e9ebf0;--ur-fondo:#fff;--ur-suave:#f5f6f9;--ur-radio:16px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ur-tinta);max-width:1200px;margin:0 auto;padding:8px;-webkit-font-smoothing:antialiased}
#ur-directorio *{box-sizing:border-box}
#ur-directorio .ur-head{margin-bottom:22px}
#ur-directorio .ur-title{position:relative;font-size:1.7rem;line-height:1.15;margin:0 0 6px;padding-left:16px;font-weight:800;letter-spacing:-.02em}
#ur-directorio .ur-title::before{content:"";position:absolute;left:0;top:2px;bottom:2px;width:6px;border-radius:3px;background:linear-gradient(180deg,var(--ur-rojo),var(--ur-rojo-osc))}
#ur-directorio .ur-sub{margin:0 0 0 16px;color:var(--ur-gris);font-size:.98rem}
#ur-directorio .ur-toolbar{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px}
#ur-directorio .ur-search-wrap{position:relative;flex:1 1 280px;min-width:0}
#ur-directorio .ur-search-ic{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;fill:none;stroke:var(--ur-gris2);stroke-width:2;stroke-linecap:round;pointer-events:none}
#ur-directorio .ur-search{width:100%;font:inherit;padding:12px 14px 12px 42px;border:1px solid var(--ur-linea);border-radius:12px;background:var(--ur-fondo);color:inherit;outline:none}
#ur-directorio .ur-filter{font:inherit;flex:0 1 220px;padding:12px 14px;border:1px solid var(--ur-linea);border-radius:12px;background:var(--ur-fondo);color:inherit;cursor:pointer;outline:none}
#ur-directorio .ur-search:focus,#ur-directorio .ur-filter:focus{border-color:var(--ur-rojo);box-shadow:0 0 0 3px rgba(214,32,43,.13)}
#ur-directorio .ur-count{margin:0 0 16px;color:var(--ur-gris);font-size:.85rem;font-weight:500}
#ur-directorio .ur-count b{color:var(--ur-tinta)}
#ur-directorio .ur-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
#ur-directorio .ur-card{display:flex;flex-direction:column;background:var(--ur-fondo);border:1px solid var(--ur-linea);border-radius:var(--ur-radio);padding:18px;transition:box-shadow .18s ease,transform .18s ease,border-color .18s ease}
#ur-directorio .ur-card:hover{box-shadow:0 10px 30px rgba(17,24,38,.1);transform:translateY(-3px);border-color:#dfe2ea}
#ur-directorio .ur-card-top{display:flex;gap:13px;align-items:center;margin-bottom:14px}
#ur-directorio .ur-avatar{flex:0 0 auto;width:48px;height:48px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1rem;letter-spacing:.5px;box-shadow:inset 0 -2px 6px rgba(0,0,0,.12)}
#ur-directorio .ur-id{min-width:0}
#ur-directorio .ur-name{font-size:1.06rem;font-weight:700;margin:0 0 2px;line-height:1.25;letter-spacing:-.01em;overflow-wrap:anywhere}
#ur-directorio .ur-cargo{margin:0;color:var(--ur-gris);font-size:.82rem;font-weight:600;text-transform:uppercase;letter-spacing:.03em;line-height:1.3}
#ur-directorio .ur-badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
#ur-directorio .ur-badge{display:inline-flex;align-items:center;gap:5px;font-size:.73rem;font-weight:600;padding:4px 10px;border-radius:999px;background:var(--ur-suave);color:var(--ur-gris);line-height:1.4}
#ur-directorio .ur-badge svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
#ur-directorio .ur-badge.ur-badge-sede{background:#fdeaec;color:var(--ur-rojo-osc)}
#ur-directorio .ur-contact{margin-top:auto;display:grid;gap:9px;border-top:1px solid var(--ur-linea);padding-top:13px}
#ur-directorio .ur-row{display:flex;gap:10px;align-items:center;font-size:.87rem;color:var(--ur-tinta)}
#ur-directorio .ur-row svg{flex:0 0 auto;width:16px;height:16px;fill:none;stroke:var(--ur-gris2);stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
#ur-directorio .ur-row a{color:var(--ur-rojo-osc);text-decoration:none;overflow-wrap:anywhere}
#ur-directorio .ur-row a:hover{text-decoration:underline}
#ur-directorio .ur-ext{color:var(--ur-gris);font-weight:600}
#ur-directorio .ur-empty{display:flex;flex-direction:column;gap:6px;text-align:center;color:var(--ur-gris);padding:44px 24px;background:var(--ur-suave);border-radius:var(--ur-radio)}
#ur-directorio .ur-empty strong{color:var(--ur-tinta);font-size:1.05rem}
#ur-directorio .ur-loading{color:var(--ur-gris);text-align:center;padding:32px}
@media (max-width:520px){#ur-directorio .ur-toolbar{flex-direction:column}#ur-directorio .ur-filter{flex:1 1 auto}#ur-directorio .ur-title{font-size:1.4rem}#ur-directorio .ur-grid{grid-template-columns:1fr}}
</style>

<script>
(function(){
  var root=document.getElementById('ur-directorio');if(!root)return;
  var SRC=root.getAttribute('data-src')||'colaboradores.json';
  var grid=root.querySelector('.ur-grid'),count=root.querySelector('.ur-count'),empty=root.querySelector('.ur-empty'),loading=root.querySelector('.ur-loading'),search=root.querySelector('.ur-search'),selSede=root.querySelector('.ur-sede'),selDep=root.querySelector('.ur-dep'),DATA=[];
  var PALETA=['#d6202b','#b5401f','#8a5a00','#3f7d3a','#0e7c86','#2563a8','#5b4bb5','#a13d8f','#1f7a5a','#9a3324'];
  var MINUS={de:1,del:1,la:1,las:1,los:1,el:1,y:1,e:1,en:1,a:1,con:1,para:1,por:1,u:1};
  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
  function norm(s){return String(s||'').normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase();}
  function tc(s){s=String(s||'').trim().toLowerCase();var i=0;return s.replace(/[^\s\-\/]+/gu,function(word){return (i++>0&&MINUS[word])?word:word.replace(/\p{L}/u,function(ch){return ch.toLocaleUpperCase('es');});});}
  function iniciales(nom,ape){var a=(nom||'').trim().charAt(0),b=(ape||'').trim().charAt(0);return ((a+b)||(nom||'?').charAt(0)).toLocaleUpperCase('es');}
  function colorDe(str){var h=0;str=String(str||'');for(var i=0;i<str.length;i++){h=(h*31+str.charCodeAt(i))>>>0;}return PALETA[h%PALETA.length];}
  function options(sel,values){values.filter(Boolean).sort(function(a,b){return tc(a).localeCompare(tc(b),'es');}).forEach(function(v){var o=document.createElement('option');o.value=v;o.textContent=tc(v);sel.appendChild(o);});}
  var IC={
    pin:'<svg viewBox="0 0 24 24"><path d="M12 21s-7-6-7-11a7 7 0 0 1 14 0c0 5-7 11-7 11z"></path><circle cx="12" cy="10" r="2.5"></circle></svg>',
    dep:'<svg viewBox="0 0 24 24"><path d="M3 21h18"></path><path d="M5 21V5l7-2 7 2v16"></path><path d="M9 9h.01M9 13h.01M15 9h.01M15 13h.01"></path></svg>',
    tel:'<svg viewBox="0 0 24 24"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3-8.6A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.3 1.8.6 2.6a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.5-1.1a2 2 0 0 1 2.1-.5c.8.3 1.7.5 2.6.6a2 2 0 0 1 1.7 2z"></path></svg>',
    mail:'<svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"></rect><path d="m3 7 9 6 9-6"></path></svg>'
  };
  function card(c){
    var nombre=[tc(c.nombres),tc(c.apellidos)].filter(Boolean).join(' ')||'Sin nombre';
    var tel='';
    if(c.pbx||c.extension){tel='<div class="ur-row">'+IC.tel+'<span>'+esc(c.pbx||'')+(c.extension?' <span class="ur-ext">ext. '+esc(c.extension)+'</span>':'')+'</span></div>';}
    var correo=c.correo?'<div class="ur-row">'+IC.mail+'<a href="mailto:'+esc(c.correo)+'">'+esc(c.correo)+'</a></div>':'';
    return '<article class="ur-card" role="listitem"><div class="ur-card-top"><span class="ur-avatar" style="background:'+colorDe(c.sede+c.apellidos)+'">'+esc(iniciales(c.nombres,c.apellidos))+'</span><div class="ur-id"><h3 class="ur-name">'+esc(nombre)+'</h3>'+(c.cargo?'<p class="ur-cargo">'+esc(tc(c.cargo))+'</p>':'')+'</div></div><div class="ur-badges">'+(c.sede?'<span class="ur-badge ur-badge-sede">'+IC.pin+esc(tc(c.sede))+'</span>':'')+(c.dependencia?'<span class="ur-badge">'+IC.dep+esc(tc(c.dependencia))+'</span>':'')+'</div>'+(tel||correo?'<div class="ur-contact">'+tel+correo+'</div>':'')+'</article>';
  }
  function render(){
    var q=norm(search.value.trim()),fs=selSede.value,fd=selDep.value;
    var vis=DATA.filter(function(c){
      if(fs&&c.sede!==fs)return false;
      if(fd&&c.dependencia!==fd)return false;
      if(q){var hay=norm([c.nombres,c.apellidos,c.cargo,c.correo,c.dependencia,c.sede].join(' '));if(hay.indexOf(q)===-1)return false;}
      return true;
    });
    grid.innerHTML=vis.map(card).join('');empty.hidden=vis.length>0;count.innerHTML='Mostrando <b>'+vis.length+'</b> de <b>'+DATA.length+'</b> colaboradores';
  }
  fetch(SRC,{cache:'no-cache'}).then(function(r){if(!r.ok)throw new Error(r.status);return r.json();}).then(function(json){
    DATA=(json.colaboradores||[]).sort(function(a,b){return (a.sede||'').localeCompare(b.sede||'','es')||(a.apellidos||'').localeCompare(b.apellidos||'','es');});
    loading.style.display='none';
    options(selSede,Array.from(new Set(DATA.map(function(c){return c.sede;}))));
    options(selDep,Array.from(new Set(DATA.map(function(c){return c.dependencia;}))));
    render();
  }).catch(function(e){loading.textContent='No se pudo cargar el directorio ('+e.message+'). Revisa la URL del JSON.';});
  search.addEventListener('input',render);selSede.addEventListener('change',render);selDep.addEventListener('change',render);
})();
</script>
